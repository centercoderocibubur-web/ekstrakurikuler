
<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Absensi Siswa | Codero Cibubur</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->

    <aside class="sidebar hide" id="sidebar">

        <div class="brand">

            <img src="coderocibubur.jpg">

            <h4>CODERO</h4>

            <span>Cibubur</span>

        </div>

        <ul class="sidebar-menu">

            <li>

                <a href="dashboard.html">

                    <i class="bi bi-grid-fill"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="pilih-sekolah.html">

                    <i class="bi bi-people-fill"></i>

                    Data Siswa

                </a>

            </li>

            <li class="active">

                <a href="absensi.html">

                    <i class="bi bi-calendar-check-fill"></i>

                    Absensi

                </a>

            </li>

            <li>

                <a href="laporan.html">

                    <i class="bi bi-file-earmark-bar-graph-fill"></i>

                    Laporan

                </a>

            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main full">

        <!-- HEADER -->

        <header class="topbar">

            <div class="left-header">

                <button class="menu-btn" id="menuToggle">

                    <i class="bi bi-list"></i>

                </button>

                <div>

                    <h3 id="judulSekolah"></h3>

                    <small id="judulPertemuan"></small>

                </div>

            </div>

            <div class="admin-box">

                <div class="avatar">

                    <i class="bi bi-person-fill"></i>

                </div>

                <div>

                    <strong>Admin</strong>

                    <small>Administrator</small>

                </div>

            </div>

        </header>

        <!-- CONTENT -->

        <section class="content">

            <!-- INFO -->

            <div class="welcome-box">

                <h2 id="tanggalPertemuan"></h2>

                <p>

                    Silakan lakukan absensi seluruh siswa.

                </p>

            </div>

            <!-- TOOLBAR -->

            <div class="card-panel">

                <div class="row g-3">

                    <div class="col-lg-5">

                        <input
                            type="text"
                            id="cariSiswa"
                            class="form-control"
                            placeholder="Cari nama siswa...">

                    </div>

                    <div class="col-lg-7 text-end">

                        <button
                            class="btn btn-success"
                            onclick="hadirSemua()">

                            <i class="bi bi-check-circle-fill"></i>

                            Hadir Semua

                        </button>

                    </div>

                </div>

            </div>

            <!-- JUMLAH -->

            <div class="card-panel">

                <div class="d-flex justify-content-between">

                    <strong>Total Siswa</strong>

                    <strong id="jumlahSiswa">0</strong>

                </div>

            </div>

            <!-- LIST SISWA -->

            <div id="listSiswa">

            </div>

            <!-- SIMPAN -->

            <div class="text-center mt-4">

                <button
                    class="btn btn-primary btn-lg"
                    onclick="simpanAbsensi()">

                    <i class="bi bi-save-fill"></i>

                    Simpan Absensi

                </button>
                <!-- Ringkasan Absensi -->

<div class="row mt-4">

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card border-success">

            <div class="card-body text-center">

                <h6 class="text-success">

                    Hadir

                </h6>

                <h2 id="jmlHadir">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card border-warning">

            <div class="card-body text-center">

                <h6 class="text-warning">

                    Izin

                </h6>

                <h2 id="jmlIzin">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card border-info">

            <div class="card-body text-center">

                <h6 class="text-info">

                    Sakit

                </h6>

                <h2 id="jmlSakit">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card border-danger">

            <div class="card-body text-center">

                <h6 class="text-danger">

                    Alpha

                </h6>

                <h2 id="jmlAlpha">0</h2>

            </div>

        </div>

    </div>

</div>

<div class="card">

    <div class="card-body">

        <div class="row text-center">

            <div class="col-md-4">

                <h6>Total Siswa</h6>

                <h3 id="jmlTotal">0</h3>

            </div>

            <div class="col-md-4">

                <h6>Kehadiran</h6>

                <h3 id="persenHadir">0%</h3>

            </div>

            <div class="col-md-4">

                <h6>Tidak Hadir</h6>

                <h3 id="jmlTidakHadir">0</h3>

            </div>

        </div>

    </div>

</div>
            </div>

        </section>

    </main>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/absensi-siswa.js"></script>


</body>

</html>
