    👨‍🎓 ${info.total} siswa

    <br>

    ✅ ${info.hadir} hadir

    <br>

    ❌ ${info.tidakHadir} tidak hadir

</div>
<!-- Modal Status Pertemuan -->

<div class="modal fade" id="modalStatus">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Status Pertemuan</h5>

                <button
                class="btn-close"
                data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <input type="hidden" id="noPertemuan">

                <div class="form-check mb-3">

                    <input
                    class="form-check-input"
                    type="radio"
                    name="statusPertemuan"
                    value="terlaksana"
                    checked>

                    <label class="form-check-label">

                        Terlaksana

                    </label>

                </div>

                <div class="form-check mb-3">

                    <input
                    class="form-check-input"
                    type="radio"
                    name="statusPertemuan"
                    value="libur nasional">

                    <label class="form-check-label">

                        Libur Nasional

                    </label>

                </div>

                <div class="form-check mb-3">

                    <input
                    class="form-check-input"
                    type="radio"
                    name="statusPertemuan"
                    value="libur sekolah">

                    <label class="form-check-label">

                        Libur Sekolah

                    </label>

                </div>

                <div class="form-check mb-3">

                    <input
                    class="form-check-input"
                    type="radio"
                    name="statusPertemuan"
                    value="guru berhalangan">

                    <label class="form-check-label">

                        Guru Berhalangan

                    </label>

                </div>

                <div class="form-check">

                    <input
                    class="form-check-input"
                    type="radio"
                    name="statusPertemuan"
                    value="kegiatan sekolah">

                    <label class="form-check-label">

                        Kegiatan Sekolah

                    </label>

                </div>
                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="statusPertemuan"
                        id="statusAkanDatang"
                        value="akan datang"
                        checked>

                    <label
                        class="form-check-label"
                        for="statusAkanDatang">

                        Akan Datang

                    </label>

                </div>
            </div>

            <div class="modal-footer">

                <button
                class="btn btn-primary"
                onclick="simpanStatusPertemuan()">

                    Lanjut

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
